<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>J&K Wedding Quiz – Player</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --dark:#1a2e0a; --deep:#243d10; --mid:#2e5016; --green:#3d6b1e; --light:#5a8f30;
  --gold:#c9a84c; --goldl:#e8c96a; --cream:#f5edd8; --cdim:rgba(245,237,216,.65);
}
html, body { width:100%; height:100%; }
body {
  font-family:'Lato',sans-serif;
  background:var(--dark);
  min-height:100vh;
  color:var(--cream);
  overflow-x:hidden;
}
#bg {
  position:fixed; inset:0; z-index:0;
  background:radial-gradient(ellipse at 30% 0%,#2e5016 0%,#1a2e0a 55%,#0d1a05 100%);
}
#bg::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 15% 80%,rgba(61,107,30,.4) 0%,transparent 40%),
             radial-gradient(circle at 85% 15%,rgba(90,143,48,.2) 0%,transparent 35%);
}
.hills { position:absolute; bottom:0; left:0; width:100%; height:120px; pointer-events:none; }

#petals { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
.petal { position:absolute; border-radius:50% 5% 50% 5%; opacity:0; animation:drift linear infinite; }
@keyframes drift {
  0%  { transform:translateY(-20px) rotate(0deg); opacity:0; }
  10% { opacity:.6; } 90% { opacity:.4; }
  100%{ transform:translateY(105vh) rotate(360deg); opacity:0; }
}

#app { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; }

/* header */
.hdr {
  display:flex; justify-content:space-between; align-items:center;
  padding:.7rem 1.2rem;
  border-bottom:1px solid rgba(201,168,76,.2);
  flex-shrink:0;
}
.hdr-name { font-family:'IM Fell English',serif; font-size:1rem; color:var(--gold); }
.score-pill {
  background:rgba(201,168,76,.12); border:1px solid rgba(201,168,76,.3);
  color:var(--goldl); font-family:'IM Fell English',serif;
  padding:.25rem .8rem; border-radius:20px; font-size:.88rem; display:none;
}

main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.2rem; }

/* screens */
.screen { display:none; width:100%; max-width:480px; animation:fadeUp .4s ease both; }
.screen.active { display:flex; flex-direction:column; align-items:center; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

/* JOIN */
.ring-glyph {
  width:72px; height:72px; border:2px solid var(--gold); border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:1.8rem;
  margin-bottom:1rem;
  animation:ringPulse 3s ease-in-out infinite;
}
@keyframes ringPulse {
  0%,100%{ box-shadow:0 0 10px rgba(201,168,76,.3); }
  50%    { box-shadow:0 0 24px rgba(201,168,76,.7); }
}
.join-title { font-family:'IM Fell English',serif; font-size:1.6rem; color:var(--goldl); text-align:center; margin-bottom:.4rem; }
.join-sub   { color:var(--cdim); font-size:.88rem; text-align:center; font-style:italic; margin-bottom:1.5rem; }
.name-input {
  width:100%; padding:.8rem 1rem; border-radius:10px;
  border:1px solid rgba(201,168,76,.4); background:rgba(26,46,10,.8);
  color:var(--cream); font-family:'Lato',sans-serif; font-size:1rem;
  outline:none; margin-bottom:.85rem; transition:border-color .2s;
}
.name-input::placeholder { color:rgba(245,237,216,.4); }
.name-input:focus { border-color:var(--gold); }
.btn-join {
  width:100%; padding:.9rem; border-radius:10px; border:none;
  background:linear-gradient(135deg,#4a7a22,#5a9028);
  color:var(--cream); font-family:'IM Fell English',serif; font-size:1.1rem;
  cursor:pointer; transition:transform .15s; box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.btn-join:hover { transform:scale(1.03); }

/* WAITING */
.wait-icon { font-size:3rem; margin-bottom:.8rem; animation:bounce 1.5s ease-in-out infinite; }
@keyframes bounce { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
.wait-title { font-family:'IM Fell English',serif; font-size:1.4rem; color:var(--goldl); text-align:center; margin-bottom:.4rem; }
.wait-sub   { color:var(--cdim); font-size:.88rem; text-align:center; font-style:italic; }

/* QUESTION */
.q-prog  { width:100%; height:3px; background:rgba(255,255,255,.1); border-radius:2px; margin-bottom:.9rem; overflow:hidden; }
.q-prog-f{ height:100%; background:linear-gradient(90deg,var(--light),var(--gold)); border-radius:2px; transition:width .4s; }

.q-top { width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:.8rem; }
.q-tag { background:rgba(201,168,76,.15); border:1px solid rgba(201,168,76,.3); color:var(--gold); font-family:'IM Fell English',serif; padding:.25rem .8rem; border-radius:20px; font-size:.82rem; }
.timer-sm { position:relative; width:44px; height:44px; }
.timer-sm svg { transform:rotate(-90deg); }
.tsbg  { fill:none; stroke:rgba(255,255,255,.1); stroke-width:3; }
.tsarc { fill:none; stroke:var(--gold); stroke-width:3; stroke-dasharray:113; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke .3s; }
.tsnum { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'IM Fell English',serif; font-size:.85rem; color:var(--gold); }

.q-emoji { font-size:1.6rem; text-align:center; margin-bottom:.4rem; }
.q-text-p { font-family:'IM Fell English',serif; font-size:1.1rem; line-height:1.5; text-align:center; color:var(--cream); margin-bottom:1.1rem; }

.opts-p { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; width:100%; }
.opt-p {
  display:flex; align-items:center; gap:.6rem;
  padding:.85rem .9rem; border:none; border-radius:11px;
  color:#fff; font-family:'Lato',sans-serif; font-size:.92rem; font-weight:700;
  cursor:pointer; text-align:left; min-height:64px;
  transition:transform .12s, opacity .2s;
  position:relative; overflow:hidden;
}
.opt-p::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,0); transition:background .15s; }
.opt-p:hover:not(:disabled)::after { background:rgba(255,255,255,.08); }
.opt-p:active:not(:disabled) { transform:scale(.97); }
.opt-p:disabled { cursor:default; }
.opt-p.a { background:#9b2222; }
.opt-p.b { background:#1e4480; }
.opt-p.c { background:#7a5800; }
.opt-p.d { background:#1a5c2a; }
.opt-p.correct { outline:3px solid var(--goldl); animation:pop .35s ease; }
.opt-p.wrong   { opacity:.28; }
.opt-p.locked  { opacity:.5; }
@keyframes pop { 0%{ transform:scale(1); } 40%{ transform:scale(1.05); } 100%{ transform:scale(1); } }
.opt-icon-p { width:28px; height:28px; background:rgba(255,255,255,.2); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:.85rem; flex-shrink:0; }

/* ANSWERED (waiting for reveal) */
.answered-wrap { display:flex; flex-direction:column; align-items:center; gap:.6rem; }
.answered-icon { font-size:3rem; }
.answered-txt  { font-family:'IM Fell English',serif; font-size:1.3rem; color:var(--goldl); text-align:center; }
.answered-sub  { color:var(--cdim); font-size:.88rem; font-style:italic; }

/* FEEDBACK */
.fb-card {
  width:100%; border-radius:14px; padding:1.3rem;
  display:flex; flex-direction:column; align-items:center; text-align:center; gap:.5rem;
}
.fb-card.ok   { background:rgba(90,143,48,.25); border:1px solid rgba(90,143,48,.4); }
.fb-card.miss { background:rgba(155,34,34,.2);  border:1px solid rgba(155,34,34,.4); }
.fb-big   { font-size:2.5rem; }
.fb-head  { font-family:'IM Fell English',serif; font-size:1.3rem; color:var(--cream); }
.fb-lore  { color:var(--cdim); font-size:.88rem; font-style:italic; line-height:1.5; }
.fb-pts   { font-family:'IM Fell English',serif; color:var(--goldl); font-size:1.1rem; margin-top:.3rem; }

/* LEADERBOARD player view */
.lb-title-p { font-family:'IM Fell English',serif; font-size:1.6rem; color:var(--goldl); margin-bottom:1rem; text-align:center; }
.lb-rows-p  { width:100%; display:flex; flex-direction:column; gap:.5rem; margin-bottom:1rem; }
.lb-row-p {
  display:flex; align-items:center;
  padding:.65rem 1rem; border-radius:9px;
  background:rgba(26,46,10,.75); border:1px solid rgba(201,168,76,.15);
}
.lb-r-rank { width:24px; height:24px; border-radius:50%; background:rgba(201,168,76,.2); color:var(--gold); display:flex; align-items:center; justify-content:center; font-size:.78rem; font-weight:700; margin-right:.7rem; flex-shrink:0; }
.lb-r-rank.gold   { background:rgba(255,215,0,.3);  color:#ffd700; }
.lb-r-rank.silver { background:rgba(192,192,192,.3); color:#c0c0c0; }
.lb-r-rank.bronze { background:rgba(205,127,50,.3);  color:#cd7f32; }
.lb-r-name { flex:1; font-weight:700; font-size:.95rem; }
.lb-r-pts  { font-family:'IM Fell English',serif; color:var(--goldl); font-size:1rem; }
.my-score-row { background:rgba(201,168,76,.12) !important; border-color:rgba(201,168,76,.35) !important; }

/* DONE */
.done-badge-p { font-size:4rem; text-align:center; margin-bottom:.4rem; }
.done-score   { font-family:'IM Fell English',serif; font-size:3rem; color:var(--goldl); text-align:center; }
.done-label   { color:var(--cdim); font-size:.85rem; text-align:center; margin-bottom:.3rem; }
.done-msg     { font-family:'IM Fell English',serif; font-size:1.2rem; color:#c8e6a0; text-align:center; margin-bottom:.3rem; }
.done-quote   { color:var(--cdim); font-size:.85rem; font-style:italic; text-align:center; margin-bottom:1.5rem; max-width:340px; }

.divider { width:60px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:.9rem auto; }
</style>
</head>
<body>
<div id="bg">
  <svg class="hills" viewBox="0 0 800 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,70 C100,40 200,85 320,55 C420,30 520,75 650,45 C730,25 780,65 800,50 L800,120 L0,120 Z" fill="#1a3a08" opacity=".8"/>
    <path d="M0,100 C80,80 200,105 320,88 C440,72 560,100 700,85 L800,90 L800,120 L0,120 Z" fill="#152e06" opacity=".9"/>
  </svg>
</div>
<div id="petals"></div>

<div id="app">
  <div class="hdr">
    <span class="hdr-name" id="hdr-name">J & K ✦ Quiz</span>
    <div class="score-pill" id="score-pill">Score: <span id="score-val">0</span></div>
  </div>

  <main>

    <!-- JOIN -->
    <div class="screen active" id="s-join">
      <div class="ring-glyph">💍</div>
      <h1 class="join-title">Join the Fellowship</h1>
      <p class="join-sub">"Not all those who wander are lost…"</p>
      <input class="name-input" id="name-in" type="text" placeholder="Your fellowship name…" maxlength="20">
      <button class="btn-join" id="btn-join">Enter the Shire ✦</button>
    </div>

    <!-- WAITING FOR HOST -->
    <div class="screen" id="s-wait">
      <div class="wait-icon">🌿</div>
      <h2 class="wait-title" id="wait-title">Awaiting the quest…</h2>
      <p class="wait-sub">The host will begin shortly</p>
    </div>

    <!-- QUESTION -->
    <div class="screen" id="s-question">
      <div class="q-prog"><div class="q-prog-f" id="p-prog-f" style="width:0%"></div></div>
      <div class="q-top">
        <span class="q-tag" id="p-qtag">Riddle 1/5</span>
        <div class="timer-sm">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle class="tsbg"  cx="22" cy="22" r="18"/>
            <circle class="tsarc" id="p-arc" cx="22" cy="22" r="18"/>
          </svg>
          <div class="tsnum" id="p-tnum">10</div>
        </div>
      </div>
      <div class="q-emoji" id="p-emoji">🌿</div>
      <p class="q-text-p" id="p-qtext">…</p>
      <div class="opts-p" id="p-opts">
        <button class="opt-p a" data-i="0"><span class="opt-icon-p">▲</span><span class="opt-lbl"></span></button>
        <button class="opt-p b" data-i="1"><span class="opt-icon-p">◆</span><span class="opt-lbl"></span></button>
        <button class="opt-p c" data-i="2"><span class="opt-icon-p">●</span><span class="opt-lbl"></span></button>
        <button class="opt-p d" data-i="3"><span class="opt-icon-p">■</span><span class="opt-lbl"></span></button>
      </div>
    </div>

    <!-- ANSWERED - waiting for reveal -->
    <div class="screen" id="s-answered">
      <div class="answered-wrap">
        <div class="answered-icon">⏳</div>
        <div class="answered-txt">Answer locked in!</div>
        <div class="answered-sub">Waiting for the host to reveal…</div>
      </div>
    </div>

    <!-- FEEDBACK -->
    <div class="screen" id="s-feedback">
      <div class="fb-card" id="fb-card">
        <div class="fb-big"  id="fb-big">🌿</div>
        <div class="fb-head" id="fb-head">Correct!</div>
        <div class="fb-lore" id="fb-lore"></div>
        <div class="fb-pts"  id="fb-pts"></div>
      </div>
    </div>

    <!-- LEADERBOARD (between questions) -->
    <div class="screen" id="s-lb">
      <h2 class="lb-title-p">🏆 Standings</h2>
      <div class="lb-rows-p" id="p-lb-rows"></div>
      <p style="color:var(--cdim);font-size:.85rem;font-style:italic;text-align:center;">Waiting for next riddle…</p>
    </div>

    <!-- DONE -->
    <div class="screen" id="s-done">
      <div class="done-badge-p" id="d-badge">🌟</div>
      <div class="done-score" id="d-score">0</div>
      <div class="done-label">total points</div>
      <p class="done-msg"   id="d-msg">Well played!</p>
      <p class="done-quote" id="d-quote"></p>
      <div class="divider"></div>
      <div class="lb-rows-p" id="d-lb" style="width:100%;max-width:380px;"></div>
    </div>

  </main>
</div>

<script>
const socket = io({ transports: ['websocket', 'polling'] });
socket.on('connect', () => console.log('✅ Socket connected:', socket.id));
socket.on('connect_error', (e) => console.error('❌ Socket error:', e.message));
let myName = '', myScore = 0, currentQ = null;

const $ = id => document.getElementById(id);
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// ── AUDIO ────────────────────────────────────────────────
let audioCtx = null, musicGain = null, musicPlaying = false, musicNodes = [];
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function startMusic() {
  const ctx = getCtx();
  if (musicPlaying) return;
  musicPlaying = true;
  musicGain = ctx.createGain();
  musicGain.gain.setValueAtTime(0.05, ctx.currentTime);
  musicGain.connect(ctx.destination);
  const notes = [523,659,784,1047,784,659,523,440,523,659,784,880,784,659,880,1047];
  const bpm = 160, step = 60/bpm;
  let t = ctx.currentTime;
  function loop() {
    notes.forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type='triangle'; o.frequency.setValueAtTime(f, t+i*step);
      g.gain.setValueAtTime(0, t+i*step);
      g.gain.linearRampToValueAtTime(0.5, t+i*step+0.01);
      g.gain.linearRampToValueAtTime(0, t+i*step+step*.8);
      o.connect(g); g.connect(musicGain);
      o.start(t+i*step); o.stop(t+i*step+step);
      musicNodes.push(o);
    });
    t += notes.length*step;
    if (musicPlaying) setTimeout(loop,(notes.length*step-0.5)*1000);
  }
  loop();
}
function playTick() {
  const ctx = getCtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(880, ctx.currentTime);
  g.gain.setValueAtTime(0.25, ctx.currentTime);
  g.gain.linearRampToValueAtTime(0, ctx.currentTime+0.08);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.1);
}

// ── JOIN ─────────────────────────────────────────────────
$('btn-join').addEventListener('click', () => {
  const n = $('name-in').value.trim();
  if (!n) { $('name-in').style.borderColor='#9b2222'; setTimeout(()=>$('name-in').style.borderColor='',800); return; }
  socket.emit('join', { name: n });
  startMusic();
});

socket.on('joined', ({ name }) => {
  myName = name;
  $('hdr-name').textContent = name;
  show('s-wait');
});

// ── STATE ─────────────────────────────────────────────────
socket.on('state', (s) => {
  if (s.phase === 'lobby') { show('s-wait'); $('wait-title').textContent = 'Awaiting the quest…'; }

  else if (s.phase === 'question') {
    currentQ = s.question;
    $('p-qtag').textContent = 'Riddle '+(s.qi+1)+'/'+s.total;
    $('p-prog-f').style.width = (s.qi/s.total*100)+'%';
    $('p-emoji').textContent = s.question.emoji;
    $('p-qtext').textContent = s.question.q;
    document.querySelectorAll('#p-opts .opt-lbl').forEach((l,i) => l.textContent = s.question.opts[i]);
    document.querySelectorAll('#p-opts .opt-p').forEach(b => { b.disabled=false; b.className=b.className.replace(/ correct| wrong| locked/g,''); b.style.opacity=''; });
    $('p-arc').style.strokeDashoffset = 113*(1-s.timeLeft/10);
    $('p-tnum').textContent = s.timeLeft;
    show('s-question');
  }

  else if (s.phase === 'reveal') {
    renderLB(s.leaderboard, 'p-lb-rows');
    show('s-lb');
  }

  else if (s.phase === 'done') {
    const pct = myScore / (s.total * 1000);
    let badge, msg, quote;
    if (pct >= .9)     { badge='👑'; msg='You know them better than they know themselves!'; quote='"All we have to decide is what to do with the time that is given us."'; }
    else if (pct >= .6){ badge='💍'; msg='A true guardian of their story!'; quote='"Even the smallest person can change the course of the future."'; }
    else if (pct >= .3){ badge='🌸'; msg='A noble effort, brave halfling!'; quote='"I will take the ring, though I do not know the way."'; }
    else               { badge='🥂'; msg='Cheers to learning more!'; quote='"Not all those who wander are lost."'; }
    $('d-badge').textContent = badge;
    $('d-score').textContent = myScore.toLocaleString();
    $('d-msg').textContent   = msg;
    $('d-quote').textContent = quote;
    renderLB(s.leaderboard, 'd-lb');
    show('s-done');
  }
});

socket.on('tick', ({ timeLeft }) => {
  $('p-arc').style.strokeDashoffset = 113*(1-timeLeft/10);
  $('p-arc').style.stroke = timeLeft<=3 ? '#e65c3b' : 'var(--gold)';
  $('p-tnum').textContent = timeLeft;
  if (timeLeft<=3 && timeLeft>0) playTick();
});

// ── ANSWER ────────────────────────────────────────────────
document.querySelectorAll('#p-opts .opt-p').forEach(b => {
  b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.i);
    socket.emit('answer', { idx });
    // lock all buttons visually
    document.querySelectorAll('#p-opts .opt-p').forEach((bb,i) => {
      bb.disabled = true;
      if (i !== idx) bb.classList.add('locked');
    });
    show('s-answered');
  });
});

socket.on('answer_ack', () => { show('s-answered'); });

socket.on('answer_result', ({ correct, pts, lore, timedOut }) => {
  if (correct) myScore += pts;
  $('score-val').textContent = myScore.toLocaleString();
  $('score-pill').style.display = 'block';

  const card = $('fb-card');
  card.className = 'fb-card ' + (correct ? 'ok' : 'miss');
  $('fb-big').textContent  = correct ? '🌿' : '🥀';
  $('fb-head').textContent = correct ? 'Correct, wise traveller!' : (timedOut ? "Time's up in the Shire!" : 'Not quite, dear hobbit…');
  $('fb-lore').textContent = lore || '';
  $('fb-pts').textContent  = correct ? '+'+pts+' points' : '';
  show('s-feedback');
});

// ── LEADERBOARD ───────────────────────────────────────────
function renderLB(data, containerId) {
  const el = $(containerId);
  if (!data || !data.length) { el.innerHTML='<p style="color:var(--cdim);text-align:center;font-size:.85rem">No scores yet</p>'; return; }
  const medals=['gold','silver','bronze'];
  el.innerHTML = data.map((e,i) => `
    <div class="lb-row-p ${e.name===myName?'my-score-row':''}">
      <span class="lb-r-rank ${medals[i]||''}">${i+1}</span>
      <span class="lb-r-name">${e.name}${e.name===myName?' (you)':''}</span>
      <span class="lb-r-pts">${e.score.toLocaleString()}</span>
    </div>`).join('');
}

// ── PARTICLES ─────────────────────────────────────────────
const pw = $('petals');
const pc = ['#e8a0b0','#f8f0e8','#f5d87a','#c8e6a0'];
for (let i=0;i<16;i++){
  const p=document.createElement('div'); p.className='petal';
  const sz=5+Math.random()*7;
  p.style.cssText=[`left:${Math.random()*100}%`,`width:${sz}px`,`height:${sz*.7}px`,`background:${pc[i%pc.length]}`,`animation-duration:${7+Math.random()*11}s`,`animation-delay:${Math.random()*9}s`].join(';');
  pw.appendChild(p);
}
</script>
</body>
</html>
